<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtelierTSA Pager OS - Legacy UI V1</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        :root {
            --lcd-bg: #9ebf3b;
            --lcd-text: #2d3316;
            --body-bg: #1a1a1a;
            --pager-case: #333;
        }
        body {
            background-color: var(--body-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        
        /* 以前のポケベル筐体（IMG_4797.PNGを参考にした無骨なデザイン） */
        .pager-frame {
            background: var(--pager-case);
            border-radius: 20px;
            padding: 30px;
            border: 4px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
            position: relative;
        }
        
        /* 以前の液晶ディスプレイUIの完全復元（2026-03-17 11.56.37.jpg準拠） */
        .lcd-screen {
            background-color: var(--lcd-bg);
            color: var(--lcd-text);
            height: 180px;
            padding: 15px;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            border: 10px solid #222;
        }
        
        /* 液晶内の以前のレイアウト */
        .status-bar { 
            font-size: 12px; 
            font-weight: bold; 
            border-bottom: 1px solid var(--lcd-text); 
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        /* 以前の入力エリア（液晶に直接浮かび上がる入力欄） */
        .input-display {
            font-size: 32px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            background: rgba(0,0,0,0.05); /* 液晶内の入力欄を目立たせる */
            border-radius: 3px;
            margin: 10px 0;
            padding: 5px;
        }

        /* ダサい入力欄を消し、液晶内の文字として機能させるためのCSS */
        #msgInput {
            border: none;
            background: transparent;
            color: var(--lcd-text);
            font-family: inherit;
            font-size: 32px;
            width: 100%;
            text-align: center;
            outline: none; /* フォーカス時の枠線を消す */
        }
        #msgInput::placeholder {
            color: rgba(45, 51, 22, 0.3);
        }
        
        /* 液晶内の履歴表示（受信メッセージ） */
        .history-area {
            font-size: 14px;
            height: 50px;
            overflow-y: scroll;
            border-top: 1px solid var(--lcd-text);
            padding-top: 5px;
        }
        
        /* 入力インターフェース（ボタン群） */
        .controls { margin-top: 20px; width: 320px; display: flex; flex-direction: column; gap: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px;
            background: #444; color: white; transition: 0.2s;
            font-family: inherit;
        }
        button:active { transform: scale(0.95); }
        .btn-send { background: #0066cc; }
        .btn-mic { background: #cc3300; }
        
        /* QR・設定セクション */
        .side-panel { margin-top: 30px; text-align: center; background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444; width: 320px;}
        #qrcode { background: white; padding: 10px; display: inline-block; margin-top: 10px; border-radius: 5px;}
    </style>
</head>
<body>

    <div class="pager-frame">
        <div class="lcd-screen">
            <div class="status-bar">
                <span id="status">PAGER MODE</span>
                <span id="timer">00:00</span>
            </div>
            
            <div class="input-display">
                <input type="text" id="msgInput" placeholder="数字を入力...">
            </div>
            
            <div class="history-area" id="history">
                READY / AtelierTSA
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button class="btn-send" onclick="send()">送信</button>
            <button class="btn-mic" id="micBtn">マイク</button>
        </div>
    </div>

    <div class="side-panel">
        <div>MY CONTACT QR</div>
        <div id="qrcode"></div>
        <p style="font-size: 12px; color: #888;">Manabuにスキャンさせて交換だっちゃ！</p>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycby82sEv8kBFUTJC-BuewNGSKYyWYi-9T_j7MTFYhvEZsizRfNUbfA8r4nJO82G1Z3E2/exec';
        const MY_ID = 'Hide';
        const TO_ID = 'Manabu';

        // QR生成
        QRCode.toCanvas(document.getElementById('qrcode'), `https://gh-hide-bot.github.io/Pokeberu-Modoki/pokeberu.html?add=${MY_ID}`);

        // メッセージ送信
        async function send() {
            const msg = document.getElementById('msgInput').value;
            if(!msg) return;
            document.getElementById('msgInput').value = "SENDING...";
            
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'sendMessage', from: MY_ID, to: TO_ID, message: msg })
                });
                document.getElementById('msgInput').value = ''; // 送信後にクリア
                setTimeout(loadMessages, 1000);
            } catch(e) {
                document.getElementById('msgInput').value = "ERROR";
            }
        }

        // メッセージ受信（履歴エリアを更新）
        async function loadMessages() {
            try {
                const res = await fetch(`${GAS_URL}?action=getMessages&user=${MY_ID}&with=${TO_ID}`);
                const data = await res.json();
                const historyArea = document.getElementById('history');
                if(data.length > 0) {
                    historyArea.innerHTML = data.map(m => `<div>[${m[1]}] ${m[3]}</div>`).join('');
                    historyArea.scrollTop = historyArea.scrollHeight; // 最下部へスクロール
                }
            } catch(e) { console.log("Polling..."); }
        }

        // マイク入力（Mic_Prototypeの機能を統合、入力欄へ流し込む）
        const micBtn = document.getElementById('micBtn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            micBtn.onclick = () => {
                recognition.start();
                document.getElementById('status').innerText = "LISTENING...";
            };
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const numbers = transcript.replace(/[^0-9]/g, '');
                if(numbers) document.getElementById('msgInput').value = numbers;
                document.getElementById('status').innerText = "READY";
            };
        }

        // 自動更新（履歴とタイマー）
        setInterval(loadMessages, 10000); // 10秒ごとにGASを確認
        setInterval(() => {
            const now = new Date();
            document.getElementById('timer').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }, 1000);

        loadMessages(); // 初回読み込み
    </script>
</body>
</html>
